<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/book.js" defer></script>
</head>
<body>
  <div class="container grid">
    <div class="header">Library</div>

    <div class="main-content grid">
      <button class="new-book">New Book</button>
      <div class="content grid"></div>
    </div>
  </div>

  <div class="backdrop hidden"></div>

  <div class="modal hidden">
    <form action="" class="flex-column">
      <div class="form-heading">Add new book</div>
      <input id="title" type="text" name="title" placeholder="Title">
      <input id="author" type="text" name="author" placeholder="Author">
      <input id="pages" type="number" name="pages" placeholder="Pages">
      <div class="check flex">
        <label for="read-or-not">Have you read it?</label>
        <input type="checkbox" name="read-or-not" id="read-or-not">
      </div>
      <button class="submit">Submit</button>
    </form>
  </div>
</body>
</html>
